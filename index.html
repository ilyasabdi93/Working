<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroCodez — Login / Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-x: hidden;
    }

    /* ===== BACK LINK ===== */
    .back-link {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      text-decoration: none;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.3s;
    }
    .back-link:hover { color: #14b8a6; }

    /* ===== CARD CONTAINER ===== */
    .card {
      width: 100%;
      max-width: 880px;
      height: 520px;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      display: flex;
      box-shadow: 0 0 25px rgba(20, 184, 166, 0.25), 0 0 60px rgba(20, 184, 166, 0.08);
      border: 1px solid rgba(20, 184, 166, 0.35);
      transition: box-shadow 0.4s;
    }
    .card:hover {
      box-shadow: 0 0 35px rgba(20, 184, 166, 0.35), 0 0 80px rgba(20, 184, 166, 0.12);
    }

    /* ===== PANELS ===== */
    .panel {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      transition: transform 0.7s cubic-bezier(0.645, 0.045, 0.355, 1),
                  clip-path 0.7s cubic-bezier(0.645, 0.045, 0.355, 1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3.5rem 2.8rem;
    }

    /* Dark Form Panel */
    .panel-dark {
      background: #0d1117;
      z-index: 2;
    }
    /* Login state: dark panel on LEFT */
    .state-login .panel-dark {
      left: 0;
      clip-path: polygon(0% 0%, 85% 0%, 100% 50%, 85% 100%, 0% 100%);
      transform: translateX(0);
    }
    /* Sign Up state: dark panel on RIGHT */
    .state-signup .panel-dark {
      left: 50%;
      clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 15% 100%, 0% 50%);
      transform: translateX(0);
    }

    /* Teal Gradient Welcome Panel */
    .panel-teal {
      background: linear-gradient(135deg, #0d9488, #0f766e, #134e4a);
      z-index: 1;
    }
    /* Login state: teal panel on RIGHT */
    .state-login .panel-teal {
      left: 50%;
      clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 15% 100%, 0% 50%);
      transform: translateX(0);
    }
    /* Sign Up state: teal panel on LEFT */
    .state-signup .panel-teal {
      left: 0;
      clip-path: polygon(0% 0%, 85% 0%, 100% 50%, 85% 100%, 0% 100%);
      transform: translateX(0);
    }

    /* ===== TEAL PANEL CONTENT ===== */
    .panel-teal .content {
      max-width: 320px;
    }
    .state-login .panel-teal .content {
      margin-left: auto;
      text-align: right;
    }
    .state-signup .panel-teal .content {
      margin-right: auto;
      text-align: left;
    }

    .panel-teal h2 {
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .panel-teal p {
      font-size: 1rem;
      font-weight: 400;
      opacity: 0.85;
      line-height: 1.5;
      max-width: 260px;
    }
    .state-login .panel-teal p { margin-left: auto; }
    .state-signup .panel-teal p { margin-right: auto; }

    /* ===== DARK PANEL CONTENT ===== */
    .panel-dark .content {
      max-width: 320px;
      width: 100%;
    }
    .state-login .panel-dark .content {
      margin-right: auto;
    }
    .state-signup .panel-dark .content {
      margin-left: auto;
    }

    .panel-dark .form-title {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
    }

    /* ===== FORM FIELDS ===== */
    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }
    .input-group input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(255,255,255,0.2);
      padding: 0.6rem 2.2rem 0.6rem 0;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-group input::placeholder {
      color: rgba(255,255,255,0.35);
      font-weight: 400;
    }
    .input-group input:focus {
      border-bottom-color: #14b8a6;
    }
    .input-group .icon {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      opacity: 0.4;
      pointer-events: none;
    }
    .input-group .icon svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ===== BUTTON ===== */
    .btn-gradient {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #14b8a6, #06b6d4);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
      letter-spacing: 0.01em;
    }
    .btn-gradient:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(20, 184, 166, 0.35);
    }
    .btn-gradient:active {
      transform: translateY(0);
    }
    .btn-gradient:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ===== TOGGLE LINK ===== */
    .toggle-text {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
    }
    .toggle-text .toggle-link {
      color: #14b8a6;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.3s;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      padding: 0;
    }
    .toggle-text .toggle-link:hover {
      color: #2dd4bf;
      text-decoration: underline;
    }

    /* ===== MESSAGES ===== */
    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: #f87171;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
    .success-msg {
      background: rgba(20,184,166,0.12);
      border: 1px solid rgba(20,184,166,0.25);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: #2dd4bf;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }

    /* ===== SPINNER ===== */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      body { padding: 1rem; align-items: flex-start; padding-top: 4rem; }
      .card {
        max-width: 100%;
        height: auto;
        min-height: 600px;
        flex-direction: column;
        border-radius: 12px;
      }
      .panel {
        position: relative;
        width: 100%;
        left: 0 !important;
        clip-path: none !important;
        transform: none !important;
        padding: 2.2rem 1.8rem;
        transition: none;
      }
      .panel-dark { order: 2; }
      .panel-teal { order: 1; }
      .panel-teal .content,
      .panel-dark .content {
        max-width: 100%;
        margin: 0 !important;
        text-align: left !important;
      }
      .panel-teal h2 { font-size: 1.7rem; }
      .panel-teal p { max-width: 100%; margin: 0 !important; }
      .state-login .panel-dark,
      .state-signup .panel-dark,
      .state-login .panel-teal,
      .state-signup .panel-teal {
        clip-path: none;
        left: 0;
      }
    }

    @media (max-width: 400px) {
      .card { min-height: 550px; }
      .panel { padding: 1.5rem 1.2rem; }
      .panel-dark .form-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <a href="landing.html" class="back-link">&#8592; Back to Portfolio</a>

  <div class="card state-login" id="authCard">
    <!-- ===== DARK FORM PANEL ===== -->
    <div class="panel panel-dark" id="darkPanel">
      <div class="content" id="formContent">
        <!-- DYNAMIC CONTENT RENDERED BY JS -->
      </div>
    </div>

    <!-- ===== TEAL WELCOME PANEL ===== -->
    <div class="panel panel-teal" id="tealPanel">
      <div class="content" id="welcomeContent">
        <!-- DYNAMIC CONTENT RENDERED BY JS -->
      </div>
    </div>
  </div>

  <script type="module">
    // ================================================================
    // Firebase Auth Import
    // ================================================================
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js';
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      sendEmailVerification,
      onAuthStateChanged,
      signOut
    } from 'https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js';

    // ================================================================
    // 🔧 REPLACE WITH YOUR FIREBASE CONFIG
    // ================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyDYmyLo_cIJmz4mhDV0B_AGMl8h17XM9Y4",
      authDomain: "my-webaite-6503f.firebasestorage.com",
      projectId: "my-webaite-6503f",
      storageBucket: "my-webaite-6503f.firebasestorage.app",
      messagingSenderId:"165181508676",
      appId: "1:165181508676:android:16a8b6460f8d1e80a04011",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ================================================================
    // State
    // ================================================================
    let isLogin = true;

    const card = document.getElementById('authCard');
    const formContent = document.getElementById('formContent');
    const welcomeContent = document.getElementById('welcomeContent');

    // ================================================================
    // SVG Icons
    // ================================================================
    const icons = {
      user: `<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
      email: `<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>`,
      lock: `<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`
    };

    // ================================================================
    // Render Functions
    // ================================================================
    function render() {
      // Update card class for clip-path transitions
      card.className = `card ${isLogin ? 'state-login' : 'state-signup'}`;

      // ---- Form Panel ----
      if (isLogin) {
        formContent.innerHTML = `
          <h2 class="form-title">Login</h2>
          <div class="error-msg" id="errorMsg"></div>
          <div class="success-msg" id="successMsg"></div>
          <form id="authForm">
            <div class="input-group">
              <input type="text" id="username" placeholder="Username" required />
              <span class="icon">${icons.user}</span>
            </div>
            <div class="input-group">
              <input type="password" id="password" placeholder="Password" required />
              <span class="icon">${icons.lock}</span>
            </div>
            <button type="submit" class="btn-gradient" id="submitBtn">Login</button>
          </form>
          <p class="toggle-text">
            Don't have an account? <button class="toggle-link" id="toggleBtn">Sign Up</button>
          </p>
        `;
      } else {
        formContent.innerHTML = `
          <h2 class="form-title">Sign Up</h2>
          <div class="error-msg" id="errorMsg"></div>
          <div class="success-msg" id="successMsg"></div>
          <form id="authForm">
            <div class="input-group">
              <input type="text" id="username" placeholder="Username" required />
              <span class="icon">${icons.user}</span>
            </div>
            <div class="input-group">
              <input type="email" id="email" placeholder="Email" required />
              <span class="icon">${icons.email}</span>
            </div>
            <div class="input-group">
              <input type="password" id="password" placeholder="Password" required />
              <span class="icon">${icons.lock}</span>
            </div>
            <button type="submit" class="btn-gradient" id="submitBtn">Register</button>
          </form>
          <p class="toggle-text">
            Already have an account? <button class="toggle-link" id="toggleBtn">Login</button>
          </p>
        `;
      }

      // ---- Welcome Panel ----
      welcomeContent.innerHTML = isLogin
        ? `<h2>WELCOME BACK!</h2><p>Hope, You and your Family have a Great Day</p>`
        : `<h2>WELCOME!</h2><p>Hope, You and your Family have a Great Day</p>`;

      // ---- Bind Events ----
      document.getElementById('toggleBtn')?.addEventListener('click', toggleView);
      document.getElementById('authForm')?.addEventListener('submit', handleSubmit);
    }

    // ================================================================
    // Toggle Login / Sign Up
    // ================================================================
    function toggleView() {
      isLogin = !isLogin;
      render();
    }

    // ================================================================
    // Form Submit
    // ================================================================
    async function handleSubmit(e) {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const btn = document.getElementById('submitBtn');
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      const username = document.getElementById('username')?.value.trim();
      const email = document.getElementById('email')?.value.trim();
      const password = document.getElementById('password')?.value;

      if (!password || password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters';
        errorMsg.style.display = 'block';
        return;
      }

      btn.innerHTML = '<span class="spinner"></span>' + (isLogin ? 'Logging in...' : 'Creating account...');
      btn.disabled = true;

      try {
        if (isLogin) {
          // Login mode — use username as email (or email field)
          const loginEmail = email || username;
          if (!loginEmail || !loginEmail.includes('@')) {
            // If the user entered a plain username, we'll use a placeholder domain
            // In production, best practice is to always ask for email on login
            errorMsg.textContent = 'Please enter a valid email address';
            errorMsg.style.display = 'block';
            btn.innerHTML = 'Login';
            btn.disabled = false;
            return;
          }
          await signInWithEmailAndPassword(auth, loginEmail, password);
          window.location.href = 'dashboard.html';
        } else {
          // Sign Up mode
          if (!email) {
            errorMsg.textContent = 'Email is required';
            errorMsg.style.display = 'block';
            btn.innerHTML = 'Register';
            btn.disabled = false;
            return;
          }
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          await sendEmailVerification(cred.user);
          successMsg.textContent = 'Account created! Check your email for verification.';
          successMsg.style.display = 'block';
          btn.innerHTML = '✓ Registered!';
          setTimeout(() => {
            isLogin = true;
            render();
          }, 2500);
        }
      } catch (err) {
        errorMsg.textContent = err.message.replace('Firebase: ', '').replace(/\(auth\/.*\)/, '');
        errorMsg.style.display = 'block';
        btn.innerHTML = isLogin ? 'Login' : 'Register';
        btn.disabled = false;
      }
    }

    // ================================================================
    // Auth State Guard (redirect if already logged in)
    // ================================================================
    onAuthStateChanged(auth, (user) => {
      if (user && window.location.pathname.endsWith('login.html') === false) {
        // Don't redirect on first load if we're on the combined page
        // Only redirect if not already on dashboard
        if (!window.location.pathname.includes('dashboard')) {
          // window.location.href = 'dashboard.html';
        }
      }
    });

    // ================================================================
    // Initial Render
    // ================================================================
    render();
  </script>
</body>
</html>
