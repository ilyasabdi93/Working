<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LuxAuth — Premium Authentication</title>

    <!-- Firebase v9+ SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />

    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --matte-black: #0d0d0d;
            --royal-blue: #0a1a3a;
            --royal-blue-light: #0f2460;
            --gold: #c9a84c;
            --gold-light: #e8d48b;
            --gold-glow: rgba(201, 168, 76, 0.4);
            --blue-glow: rgba(30, 100, 255, 0.35);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-focus-border: var(--gold);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 28px;
            --radius-xl: 40px;
            --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--matte-black);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ===== SPLIT BACKGROUND ===== */
        .split-bg {
            position: fixed;
            inset: 0;
            display: flex;
            z-index: 0;
        }
        .split-bg .left {
            flex: 1;
            background: var(--matte-black);
            position: relative;
            overflow: hidden;
        }
        .split-bg .left::after {
            content: '';
            position: absolute;
            right: -30%;
            top: -20%;
            width: 80%;
            height: 140%;
            background: radial-gradient(ellipse at center, rgba(201, 168, 76, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .split-bg .right {
            flex: 1;
            background: linear-gradient(160deg, #0a1a3a 0%, #0f2460 40%, #132d6b 70%, #163578 100%);
            position: relative;
            overflow: hidden;
        }
        .split-bg .right::before {
            content: '';
            position: absolute;
            left: -30%;
            top: -10%;
            width: 100%;
            height: 120%;
            background: radial-gradient(ellipse at center, rgba(30, 100, 255, 0.10) 0%, transparent 70%);
            pointer-events: none;
        }
        .split-bg .right::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--blue-glow), transparent);
        }

        /* Cinematic light orbs */
        .light-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }
        .light-orb.orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(30, 100, 255, 0.12), transparent);
            top: -10%;
            left: 40%;
            animation: orbFloat 12s ease-in-out infinite alternate;
        }
        .light-orb.orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.08), transparent);
            bottom: -5%;
            right: 30%;
            animation: orbFloat 8s ease-in-out infinite alternate-reverse;
        }
        .light-orb.orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04), transparent);
            top: 50%;
            left: 20%;
            animation: orbFloat 10s ease-in-out infinite alternate;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(60px, -40px) scale(1.15);
            }
        }

        /* ===== CHARACTER CONTAINER ===== */
        .character-wrapper {
            position: fixed;
            top: 6%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 200px;
            height: 220px;
            pointer-events: none;
        }

        .character {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Character SVG */
        #character-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 8px 40px rgba(201, 168, 76, 0.15));
            transition: transform 0.6s var(--transition-smooth);
        }

        .character-glow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(10px);
            animation: glowPulse 3s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            0% {
                opacity: 0.5;
                transform: translateX(-50%) scaleX(1);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) scaleX(1.2);
            }
        }

        /* ===== MAIN CONTAINER ===== */
        .auth-container {
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            padding-top: 180px;
            /* space for character */;
        }

        /* ===== GLASS CARD ===== */
        .auth-card {
            position: relative;
            width: 100%;
            max-width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 48px 36px 40px;
            box-shadow:
                0 24px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 0 60px rgba(30, 100, 255, 0.05);
            transition: box-shadow 0.5s var(--transition-smooth), transform 0.5s var(--transition-smooth);
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--blue-glow), transparent);
            opacity: 0.6;
        }

        .auth-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-xl);
            padding: 1px;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.1), transparent 40%, transparent 60%, rgba(30, 100, 255, 0.1));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .auth-card:hover {
            box-shadow:
                0 32px 100px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                0 0 80px rgba(30, 100, 255, 0.08);
            transform: translateY(-2px);
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            margin-bottom: 12px;
            box-shadow: 0 4px 20px var(--gold-glow);
            font-size: 24px;
            font-weight: 700;
            color: var(--matte-black);
            font-family: 'Playfair Display', serif;
        }
        .brand h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 22px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        /* ===== TOGGLE TABS ===== */
        .toggle-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 60px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
        }

        .toggle-tabs .tab-btn {
            flex: 1;
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.4s var(--transition-smooth);
            position: relative;
            z-index: 2;
            letter-spacing: 0.3px;
        }

        .toggle-tabs .tab-btn.active {
            color: #fff;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.2), rgba(201, 168, 76, 0.05));
            box-shadow: 0 2px 12px rgba(201, 168, 76, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .toggle-tabs .tab-btn:first-child.active {
            background: linear-gradient(135deg, rgba(30, 100, 255, 0.25), rgba(30, 100, 255, 0.05));
            box-shadow: 0 2px 12px rgba(30, 100, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .toggle-tabs .tab-slider {
            position: absolute;
            top: 4px;
            bottom: 4px;
            width: calc(50% - 4px);
            border-radius: 40px;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.15), rgba(201, 168, 76, 0.03));
            transition: transform 0.5s var(--transition-bounce);
            z-index: 1;
            box-shadow: 0 2px 16px rgba(201, 168, 76, 0.08);
        }

        .toggle-tabs .tab-slider.left {
            transform: translateX(0);
        }
        .toggle-tabs .tab-slider.right {
            transform: translateX(calc(100% + 4px));
        }

        /* ===== FORM PANELS ===== */
        .form-panels {
            position: relative;
            overflow: hidden;
            min-height: 320px;
        }

        .form-panel {
            width: 100%;
            transition: transform 0.6s var(--transition-smooth), opacity 0.5s var(--transition-smooth);
        }

        .form-panel.signin-panel {
            transform: translateX(0);
            opacity: 1;
        }
        .form-panel.signin-panel.slide-left {
            transform: translateX(-120%);
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
        }

        .form-panel.signup-panel {
            transform: translateX(120%);
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }
        .form-panel.signup-panel.slide-in {
            transform: translateX(0);
            opacity: 1;
            position: relative;
        }

        /* ===== FORM ELEMENTS ===== */
        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 11px;
        }

        .input-group .input-wrap {
            position: relative;
        }

        .input-group .input-wrap .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.3s ease;
            font-style: normal;
        }

        .input-group .input-wrap input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            outline: none;
            transition: all 0.35s var(--transition-smooth);
            letter-spacing: 0.2px;
        }

        .input-group .input-wrap input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 13px;
        }

        .input-group .input-wrap input:focus {
            border-color: var(--input-focus-border);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.08), 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .input-group .input-wrap input:focus+.icon,
        .input-group .input-wrap input:focus~.icon {
            color: var(--gold);
        }

        .input-group .input-wrap .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            transition: color 0.3s ease;
        }
        .input-group .input-wrap .toggle-pw:hover {
            color: var(--text-secondary);
        }

        .input-group .error-msg {
            font-size: 11px;
            color: #ff6b6b;
            margin-top: 4px;
            display: none;
            font-weight: 400;
            letter-spacing: 0.2px;
        }
        .input-group .error-msg.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        /* Forgot password */
        .forgot-row {
            text-align: right;
            margin-bottom: 20px;
        }
        .forgot-row a {
            color: var(--text-muted);
            font-size: 12px;
            text-decoration: none;
            transition: color 0.3s ease;
            cursor: pointer;
            font-weight: 400;
        }
        .forgot-row a:hover {
            color: var(--gold-light);
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: var(--radius-md);
            color: var(--matte-black);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s var(--transition-smooth);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px var(--gold-glow);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--gold-glow);
        }
        .btn-submit:active {
            transform: translateY(0) scale(0.98);
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit .btn-text {
            position: relative;
            z-index: 2;
        }
        .btn-submit .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 0, 0, 0.15);
            border-top-color: var(--matte-black);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .btn-submit.loading .btn-text {
            display: none;
        }
        .btn-submit.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 22px 0 20px;
            gap: 16px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
        }
        .divider span {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Google Button */
        .btn-google {
            width: 100%;
            padding: 13px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.35s var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        .btn-google:hover {
            background: rgba(66, 133, 244, 0.12);
            border-color: rgba(66, 133, 244, 0.3);
            box-shadow: 0 4px 20px rgba(66, 133, 244, 0.1);
            transform: translateY(-1px);
        }
        .btn-google:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-google .google-icon svg {
            width: 20px;
            height: 20px;
        }
        .btn-google.loading {
            opacity: 0.7;
            pointer-events: none;
        }
        .btn-google.loading .google-icon {
            animation: spin 0.7s linear infinite;
        }
        .btn-google.loading .google-icon svg {
            opacity: 0.5;
        }

        /* ===== SUCCESS MESSAGE ===== */
        .success-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(201, 168, 76, 0.12);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(201, 168, 76, 0.2);
            padding: 14px 28px;
            border-radius: 60px;
            color: var(--gold-light);
            font-size: 14px;
            font-weight: 400;
            opacity: 0;
            transition: all 0.5s var(--transition-bounce);
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }
        .success-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .success-toast.error {
            border-color: rgba(255, 107, 107, 0.2);
            background: rgba(255, 107, 107, 0.08);
            color: #ff6b6b;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            animation: cardEntry 0.8s var(--transition-smooth) 0.2s both;
        }
        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .auth-card {
                padding: 32px 20px 28px;
                border-radius: var(--radius-lg);
            }
            .character-wrapper {
                width: 150px;
                height: 170px;
                top: 2%;
            }
            .auth-container {
                padding-top: 140px;
                padding-left: 12px;
                padding-right: 12px;
            }
            .brand h1 {
                font-size: 19px;
            }
            .toggle-tabs .tab-btn {
                font-size: 12px;
                padding: 8px 12px;
            }
            .input-group .input-wrap input {
                padding: 12px 14px 12px 42px;
                font-size: 13px;
            }
            .btn-submit {
                padding: 13px;
                font-size: 14px;
            }
            .split-bg .left {
                display: none;
            }
            .split-bg .right {
                flex: 1;
            }
        }

        @media (max-width: 380px) {
            .auth-card {
                padding: 24px 16px 24px;
            }
            .character-wrapper {
                width: 120px;
                height: 140px;
                top: 1%;
            }
            .auth-container {
                padding-top: 110px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== SPLIT BACKGROUND ===== -->
    <div class="split-bg">
        <div class="left"></div>
        <div class="right"></div>
    </div>

    <!-- Cinematic orbs -->
    <div class="light-orb orb-1"></div>
    <div class="light-orb orb-2"></div>
    <div class="light-orb orb-3"></div>

    <!-- ===== 3D CHARACTER ===== -->
    <div class="character-wrapper" id="characterWrapper">
        <div class="character">
            <svg id="character-svg" viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Body glow -->
                <defs>
                    <radialGradient id="bodyGlow" cx="50%" cy="40%" r="50%">
                        <stop offset="0%" stop-color="rgba(201,168,76,0.06)" />
                        <stop offset="100%" stop-color="transparent" />
                    </radialGradient>
                    <radialGradient id="eyeShine" cx="40%" cy="35%" r="50%">
                        <stop offset="0%" stop-color="#ffffff" />
                        <stop offset="100%" stop-color="#c9a84c" />
                    </radialGradient>
                </defs>

                <!-- Body / Torso -->
                <ellipse cx="100" cy="170" rx="38" ry="45" fill="rgba(201,168,76,0.06)" />
                <ellipse cx="100" cy="170" rx="30" ry="38" fill="rgba(255,255,255,0.03)" stroke="rgba(201,168,76,0.08)" stroke-width="0.5" />

                <!-- Head -->
                <ellipse cx="100" cy="80" rx="42" ry="48" fill="url(#bodyGlow)" stroke="rgba(201,168,76,0.1)" stroke-width="0.5" />
                <ellipse cx="100" cy="78" rx="38" ry="44" fill="rgba(255,255,255,0.02)" />

                <!-- Face shape -->
                <ellipse cx="100" cy="82" rx="30" ry="34" fill="rgba(255,255,255,0.04)" stroke="rgba(201,168,76,0.06)" stroke-width="0.3" />

                <!-- Eyes -->
                <g id="eyes-group">
                    <!-- Left eye -->
                    <ellipse cx="84" cy="72" rx="6" ry="7" fill="rgba(255,255,255,0.06)" stroke="rgba(201,168,76,0.12)" stroke-width="0.5" />
                    <ellipse cx="84" cy="72" rx="4.5" ry="5.5" fill="#1a1a2e" />
                    <!-- Left pupil -->
                    <circle id="left-pupil" cx="85" cy="72" r="2.2" fill="url(#eyeShine)" />
                    <circle id="left-glint" cx="86.5" cy="70.5" r="0.8" fill="rgba(255,255,255,0.6)" />

    <!-- ===== TOAST ===== -->
    <div class="success-toast" id="toast"></div>

    <script>
        // =======================================================
        // 1. FIREBASE CONFIG - REPLACE WITH YOUR OWN
        // =======================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDYmyLo_cIJmz4mhDV0B_AGMl8h17XM9Y4",
            authDomain: "my-webaite-6503f.firebasestorage.com",
            projectId: "my-webaite-6503f",
            storageBucket: "my-webaite-6503f.firebasestorage.app",
            messagingSenderId: "165181508676",
            appId: "1:165181508676:android:16a8b6460f8d1e80a04011",
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // =======================================================
        // 2. DOM REFS
        // =======================================================
        const signinPanel = document.getElementById('signinPanel');
        const signupPanel = document.getElementById('signupPanel');
        const tabSignin = document.getElementById('tabSignin');
        const tabSignup = document.getElementById('tabSignup');
        const tabSlider = document.getElementById('tabSlider');

        const signinForm = document.getElementById('signinForm');
        const signupForm = document.getElementById('signupForm');
        const signinEmail = document.getElementById('signinEmail');
        const signinPassword = document.getElementById('signinPassword');
        const signupName = document.getElementById('signupName');
        const signupEmail = document.getElementById('signupEmail');
        const signupPassword = document.getElementById('signupPassword');
        const signinBtn = document.getElementById('signinBtn');
        const signupBtn = document.getElementById('signupBtn');
        const googleSigninBtn = document.getElementById('googleSigninBtn');
        const googleSignupBtn = document.getElementById('googleSignupBtn');
        const toast = document.getElementById('toast');

        const toggleSigninPw = document.getElementById('toggleSigninPw');
        const toggleSignupPw = document.getElementById('toggleSignupPw');
        const forgotLink = document.getElementById('forgotPassword');

        // Eye / pupil elements
        const leftPupil = document.getElementById('left-pupil');
        const rightPupil = document.getElementById('right-pupil');
        const leftGlint = document.getElementById('left-glint');
        const rightGlint = document.getElementById('right-glint');
        const leftHand = document.getElementById('left-hand');
        const rightHand = document.getElementById('right-hand');
        const leftArm = document.getElementById('left-arm');
        const rightArm = document.getElementById('right-arm');
        const mouth = document.getElementById('mouth');
        const leftBrow = document.getElementById('left-brow');
        const rightBrow = document.getElementById('right-brow');
        const characterSvg = document.getElementById('character-svg');

        // =======================================================
        // 3. CHARACTER ANIMATION ENGINE
        // =======================================================
        const PUPIL_RANGE = 3.5;
        let currentMode = 'idle'; // 'idle' | 'tracking' | 'covering' | 'covered_idle' | 'uncovering'
        let isPasswordFocused = false;
        let isPasswordComplete = false;
        let eyesCovered = false;
        let animationFrame = null;
        let mouseX = 0,
            mouseY = 0;
        let targetPupilX = 0,
            targetPupilY = 0;
        let currentPupilX = 0,
            currentPupilY = 0;

        function setPupils(x, y) {
            leftPupil.setAttribute('cx', 84 + x);
            leftPupil.setAttribute('cy', 72 + y);
            rightPupil.setAttribute('cx', 116 + x);
            rightPupil.setAttribute('cy', 72 + y);
            leftGlint.setAttribute('cx', 85.5 + x);
            leftGlint.setAttribute('cy', 70.5 + y);
            rightGlint.setAttribute('cx', 117.5 + x);
            rightGlint.setAttribute('cy', 70.5 + y);
        }

        function smoothPupils() {
            currentPupilX += (targetPupilX - currentPupilX) * 0.12;
            currentPupilY += (targetPupilY - currentPupilY) * 0.12;
            setPupils(currentPupilX, currentPupilY);
            if (Math.abs(targetPupilX - currentPupilX) > 0.01 || Math.abs(targetPupilY - currentPupilY) > 0.01) {
                animationFrame = requestAnimationFrame(smoothPupils);
            }
        }

        function startEyeTracking(clientX, clientY) {
            if (eyesCovered || isPasswordFocused) return;
            const rect = characterSvg.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2 + 10;
            const dx = (clientX - cx) / rect.width;
            const dy = (clientY - cy) / rect.height;
            targetPupilX = Math.max(-PUPIL_RANGE, Math.min(PUPIL_RANGE, dx * PUPIL_RANGE * 1.6));
            targetPupilY = Math.max(-PUPIL_RANGE, Math.min(PUPIL_RANGE, dy * PUPIL_RANGE * 1.2));
            cancelAnimationFrame(animationFrame);
            smoothPupils();
        }

        function resetEyes() {
            targetPupilX = 0;
            targetPupilY = 0;
            cancelAnimationFrame(animationFrame);
            smoothPupils();
        }

        function coverEyes() {
            eyesCovered = true;
            resetEyes();
            // Animate hands up to cover eyes
            leftHand.setAttribute('transform', 'translate(0, -52) rotate(-5, 60, 138)');
            rightHand.setAttribute('transform', 'translate(0, -52) rotate(5, 140, 138)');
            leftArm.setAttribute('d', 'M72 130 Q55 78 58 86');
            rightArm.setAttribute('d', 'M128 130 Q145 78 142 86');
            // Slight sad/neutral brow
            leftBrow.setAttribute('d', 'M76 63 Q84 60 92 63');
            rightBrow.setAttribute('d', 'M108 63 Q116 60 124 63');
            // Mouth becomes neutral
            mouth.setAttribute('d', 'M92 94 Q100 95 108 94');
            // Hide pupils behind hands (move to center)
            setPupils(0, 0);
        }

        function uncoverEyes(withSmile = true) {
            eyesCovered = false;
            // Hands back down
            leftHand.setAttribute('transform', 'rotate(-10, 60, 138)');
            rightHand.setAttribute('transform', 'rotate(10, 140, 138)');
            leftArm.setAttribute('d', 'M72 130 Q60 135 58 138');
            rightArm.setAttribute('d', 'M128 130 Q140 135 142 138');
            // Brows normal
            leftBrow.setAttribute('d', 'M76 62 Q84 57 92 62');
            rightBrow.setAttribute('d', 'M108 62 Q116 57 124 62');
            // Smile
            if (withSmile) {
                mouth.setAttribute('d', 'M90 92 Q100 100 110 92');
            } else {
                mouth.setAttribute('d', 'M92 94 Q100 95 108 94');
            }
            resetEyes();
        }

        // Subtle idle animation for covered state
        let idleAnimTimer = null;

        function startCoveredIdle() {
            if (idleAnimTimer) clearInterval(idleAnimTimer);
            let phase = 0;
            idleAnimTimer = setInterval(() => {
                if (!eyesCovered) {
                    clearInterval(idleAnimTimer);
                    return;
                }
                phase++;
                const slightMove = Math.sin(phase * 0.3) * 0.8;
                leftHand.setAttribute('transform', `translate(${slightMove}, -52) rotate(-5, 60, 138)`);
                rightHand.setAttribute('transform', `translate(${-slightMove}, -52) rotate(5, 140, 138)`);
            }, 800);
        }

        function stopCoveredIdle() {
            if (idleAnimTimer) {
                clearInterval(idleAnimTimer);
                idleAnimTimer = null;
            }
        }

        // =======================================================
        // 4. PASSWORD FIELD DETECTION
        // =======================================================
        let passwordTypingTimer = null;

        signinPassword.addEventListener('focus', () => {
            isPasswordFocused = true;
            isPasswordComplete = false;
            coverEyes();
            startCoveredIdle();
        });

        signinPassword.addEventListener('input', () => {
            if (!eyesCovered) {
                coverEyes();
                startCoveredIdle();
            }
            // Detect if user stopped typing (password "complete")
            clearTimeout(passwordTypingTimer);
            passwordTypingTimer = setTimeout(() => {
                if (isPasswordFocused && eyesCovered) {
                    isPasswordComplete = true;
                    stopCoveredIdle();
                    uncoverEyes(true);
                    isPasswordFocused = false;
                }
            }, 1500);
        });

        signinPassword.addEventListener('blur', () => {
            // Don't uncover on blur - let them finish typing
        });

        // Email field tracking
        signinEmail.addEventListener('mousemove', (e) => {
            if (!eyesCovered && !isPasswordFocused) {
                startEyeTracking(e.clientX, e.clientY);
            }
        });

        signinEmail.addEventListener('mouseleave', () => {
            if (!eyesCovered && !isPasswordFocused) {
                resetEyes();
            }
        });

        // Also track mouse on the whole card for eyes
        document.getElementById('authCard').addEventListener('mousemove', (e) => {
            if (!eyesCovered && !isPasswordFocused && document.activeElement === signinEmail) {
                startEyeTracking(e.clientX, e.clientY);
            }
        });

        // =======================================================
        // 5. TOGGLE PASSWORD VISIBILITY
        // =======================================================
        toggleSigninPw.addEventListener('click', () => {
            const inp = signinPassword;
            const type = inp.getAttribute('type') === 'password' ? 'text' : 'password';
            inp.setAttribute('type', type);
            toggleSigninPw.textContent = type === 'password' ? '👁' : '👁‍🗨';
        });

        toggleSignupPw.addEventListener('click', () => {
            const inp = signupPassword;
            const type = inp.getAttribute('type') === 'password' ? 'text' : 'password';
            inp.setAttribute('type', type);
            toggleSignupPw.textContent = type === 'password' ? '👁' : '👁‍🗨';
        });

        // =======================================================
        // 6. TAB TOGGLE (Slide panels)
        // =======================================================
        function switchToSignin() {
            tabSignin.classList.add('active');
            tabSignup.classList.remove('active');
            tabSlider.className = 'tab-slider left';

            signinPanel.classList.remove('slide-left');
            signinPanel.style.position = 'relative';
            signupPanel.classList.remove('slide-in');
            signupPanel.style.position = 'absolute';
            signupPanel.style.transform = 'translateX(120%)';
            signupPanel.style.opacity = '0';
            signinPanel.style.transform = 'translateX(0)';
            signinPanel.style.opacity = '1';

            // Reset character if needed
            if (eyesCovered && !isPasswordFocused) {
                stopCoveredIdle();
                uncoverEyes(true);
            }
        }

        function switchToSignup() {
            tabSignup.classList.add('active');
            tabSignin.classList.remove('active');
            tabSlider.className = 'tab-slider right';

            signinPanel.classList.add('slide-left');
            signinPanel.style.position = 'absolute';
            signupPanel.style.position = 'relative';
            signupPanel.classList.add('slide-in');
            signupPanel.style.transform = 'translateX(0)';
            signupPanel.style.opacity = '1';
            signinPanel.style.transform = 'translateX(-120%)';
            signinPanel.style.opacity = '0';

            // Reset character
            if (eyesCovered) {
                stopCoveredIdle();
                uncoverEyes(true);
            }
            isPasswordFocused = false;
        }

        tabSignin.addEventListener('click', switchToSignin);
        tabSignup.addEventListener('click', switchToSignup);

        // =======================================================
        // 7. TOAST HELPER
        // =======================================================
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = 'success-toast show' + (isError ? ' error' : '');
            clearTimeout(toast._hide);
            toast._hide = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // =======================================================
        // 8. VALIDATION HELPERS
        // =======================================================
        function setError(el, msg) {
            const err = el.closest('.input-group').querySelector('.error-msg');
            if (err) {
                err.textContent = msg;
                err.classList.toggle('show', !!msg);
            }
        }

        function clearAllErrors() {
            document.querySelectorAll('.error-msg').forEach(el => {
                el.textContent = '';
                el.classList.remove('show');
            });
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // =======================================================
        // 9. FIREBASE AUTH - EMAIL & PASSWORD
        // =======================================================

        // --- SIGN IN ---
        signinForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAllErrors();

            const email = signinEmail.value.trim();
            const password = signinPassword.value;

            if (!email || !isValidEmail(email)) {
                setError(signinEmail, 'Please enter a valid email address');
                return;
            }
            if (!password || password.length < 6) {
                setError(signinPassword, 'Password must be at least 6 characters');
                return;
            }

            signinBtn.classList.add('loading');
            signinBtn.disabled = true;

            try {
                await auth.signInWithEmailAndPassword(email, password);
                showToast('Welcome back! Signed in successfully.');
                signinForm.reset();
            } catch (err) {
                let msg = 'Authentication failed. Please try again.';
                if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' ||
                    err.code === 'auth/invalid-email') {
                    msg = 'Invalid email or password.';
                } else if (err.code === 'auth/too-many-requests') {
                    msg = 'Too many attempts. Please try again later.';
                }
                setError(signinEmail, msg);
                showToast(msg, true);
            } finally {
                signinBtn.classList.remove('loading');
                signinBtn.disabled = false;
            }
        });

        // --- SIGN UP ---
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAllErrors();

            const name = signupName.value.trim();
            const email = signupEmail.value.trim();
            const password = signupPassword.value;

            if (!name) {
                showToast('Please enter your full name.', true);
                return;
            }
            if (!email || !isValidEmail(email)) {
                setError(signupEmail, 'Please enter a valid email address');
                return;
            }
            if (!password || password.length < 6) {
                setError(signupPassword, 'Password must be at least 6 characters');
                return;
            }

            signupBtn.classList.add('loading');
            signupBtn.disabled = true;

            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await cred.user.updateProfile({ displayName: name });
                showToast('Account created! Welcome to LuxAuth.');
                signupForm.reset();
                // Switch to signin
                setTimeout(switchToSignin, 800);
            } catch (err) {
                let msg = 'Registration failed. Please try again.';
                if (err.code === 'auth/email-already-in-use') {
                    msg = 'This email is already registered.';
                } else if (err.code === 'auth/weak-password') {
                    msg = 'Password should be at least 6 characters.';
                } else if (err.code === 'auth/invalid-email') {
                    msg = 'Invalid email address.';
                }
                setError(signupEmail, msg);
                showToast(msg, true);
            } finally {
                signupBtn.classList.remove('loading');
                signupBtn.disabled = false;
            }
        });

        // =======================================================
        // 10. FIREBASE AUTH - GOOGLE
        // =======================================================
        async function handleGoogleAuth(btn) {
            btn.classList.add('loading');
            btn.disabled = true;
            try {
                await auth.signInWithPopup(googleProvider);
                showToast('Signed in with Google successfully!');
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                    showToast('Google sign-in failed. Please try again.', true);
                }
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        googleSigninBtn.addEventListener('click', () => handleGoogleAuth(googleSigninBtn));
        googleSignupBtn.addEventListener('click', () => handleGoogleAuth(googleSignupBtn));

        // =======================================================
        // 11. FORGOT PASSWORD
        // =======================================================
        forgotLink.addEventListener('click', async () => {
            const email = signinEmail.value.trim();
            if (!email || !isValidEmail(email)) {
                showToast('Please enter your email address first.', true);
                signinEmail.focus();
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                showToast(`Password reset link sent to ${email}`);
            } catch (err) {
                let msg = 'Failed to send reset email.';
                if (err.code === 'auth/user-not-found') {
                    msg = 'No account found with this email.';
                } else if (err.code === 'auth/invalid-email') {
                    msg = 'Invalid email address.';
                }
                showToast(msg, true);
            }
        });

        // =======================================================
        // 12. PERSISTENT SESSION / AUTH STATE
        // =======================================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is signed in - show welcome
                const displayName = user.displayName || user.email.split('@')[0];
                showToast(`Welcome, ${displayName}! You are signed in.`);
                // In a real app, you'd redirect or show a dashboard
            } else {
                // User is signed out
                // showToast('Signed out successfully.');
            }
        });

        // =======================================================
        // 13. LOGOUT (accessible via console or can be bound to a button)
        // =======================================================
        window.logout = async function() {
            try {
                await auth.signOut();
                showToast('Signed out successfully.');
            } catch (err) {
                showToast('Failed to sign out.', true);
            }
        };

        // =======================================================
        // 14. INIT
        // =======================================================
        console.log('🔐 LuxAuth initialized. Use logout() to sign out.');
        console.log('⚠️  Replace firebaseConfig with your own Firebase project details.');
    </script>

</body>
